name: Build Capacitor APK

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'App Name'
        required: true
        default: 'MyApp'
      packageName:
        description: 'Package Name'
        required: true
        default: 'com.myapp.app'
      repoUrl:
        description: 'GitHub Repo URL'
        required: true
      buildType:
        description: 'Build Type'
        required: false
        default: 'debug'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone user repo
        run: git clone ${{ github.event.inputs.repoUrl }} project
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: ./project
        run: npm install

      - name: Build web app
        working-directory: ./project
        run: npm run build || echo "No build script"

      - name: Install Capacitor
        working-directory: ./project
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Find web directory
        id: webdir
        working-directory: ./project
        run: |
          if [ -d "dist" ]; then
            echo "dir=dist" >> $GITHUB_OUTPUT
          elif [ -d "build" ]; then
            echo "dir=build" >> $GITHUB_OUTPUT
          elif [ -d "out" ]; then
            echo "dir=out" >> $GITHUB_OUTPUT
          elif [ -d "public" ]; then
            echo "dir=public" >> $GITHUB_OUTPUT
          else
            mkdir -p dist
            echo "<html><body><h1>App</h1></body></html>" > dist/index.html
            echo "dir=dist" >> $GITHUB_OUTPUT
          fi

      - name: Initialize Capacitor
        working-directory: ./project
        run: npx cap init "${{ github.event.inputs.appName }}" "${{ github.event.inputs.packageName }}" --web-dir=${{ steps.webdir.outputs.dir }}

      - name: Add Android
        working-directory: ./project
        run: npx cap add android

      - name: Fix Capacitor Android Java Version
        working-directory: ./project/android
        run: |
          echo "org.gradle.java.home=/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/21.0.5-11/x64" >> gradle.properties

      - name: Sync
        working-directory: ./project
        run: npx cap sync android

      - name: Build APK
        working-directory: ./project/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.appName }}-capacitor
          path: ./project/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
