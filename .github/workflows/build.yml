name: Build APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Name'
        required: true
        default: 'MyApp'
      main_code:
        description: 'Base64 MainActivity code'
        required: true
      layout_code:
        description: 'Base64 Layout XML code'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar

      - name: Insert MainActivity code
        run: |
          echo "${{ github.event.inputs.main_code }}" | base64 -d > app/src/main/java/com/mybuilder/app/MainActivity.kt

      - name: Insert Layout code
        if: ${{ github.event.inputs.layout_code != '' }}
        run: |
          echo "${{ github.event.inputs.layout_code }}" | base64 -d > app/src/main/res/layout/activity_main.xml

      - name: Update app name
        run: |
          sed -i 's/MyApp/${{ github.event.inputs.app_name }}/g' app/src/main/res/values/strings.xml

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
