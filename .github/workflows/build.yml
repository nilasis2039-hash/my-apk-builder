name: Build APK

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'App Name'
        required: true
        default: 'MyApp'
      packageName:
        description: 'Package Name'
        required: false
        default: 'com.mybuilder.app'
      buildMethod:
        description: 'Build Method'
        required: false
        default: 'paste'
      main_code:
        description: 'Base64 MainActivity code'
        required: true
      layout_code:
        description: 'Base64 Layout XML code'
        required: false
        default: ''
      dependencies:
        description: 'Extra dependencies'
        required: false
        default: ''
      buildType:
        description: 'debug or release'
        required: false
        default: 'debug'
      minSdk:
        description: 'Minimum SDK'
        required: false
        default: '24'
      permissions:
        description: 'Permissions'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar

      - name: Clean old code
        run: |
          rm -rf app/src/main/java/*

      - name: Insert MainActivity code
        run: |
          mkdir -p app/src/main/java/com/mybuilder/app
          echo "${{ github.event.inputs.main_code }}" | base64 -d > app/src/main/java/com/mybuilder/app/MainActivity.kt
          
          # Fix package name in code
          sed -i "1s|^package.*|package com.mybuilder.app|" app/src/main/java/com/mybuilder/app/MainActivity.kt

      - name: Insert Layout code
        if: ${{ github.event.inputs.layout_code != '' }}
        run: |
          echo "${{ github.event.inputs.layout_code }}" | base64 -d > app/src/main/res/layout/activity_main.xml

      - name: Update app name
        run: |
          sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">${{ github.event.inputs.appName }}</string>|g" app/src/main/res/values/strings.xml

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build APK
        run: |
          if [ "${{ github.event.inputs.buildType }}" = "release" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.appName }}-${{ github.event.inputs.buildType }}
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          retention-days: 7
