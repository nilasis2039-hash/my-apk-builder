name: Build APK

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'App Name'
        required: true
        default: 'MyApp'
      packageName:
        description: 'Package Name'
        required: false
        default: 'com.mybuilder.app'
      buildMethod:
        description: 'Build Method'
        required: false
        default: 'paste'
      main_code:
        description: 'Base64 MainActivity code'
        required: true
      layout_code:
        description: 'Base64 Layout XML code'
        required: false
        default: ''
      dependencies:
        description: 'Extra dependencies'
        required: false
        default: ''
      buildType:
        description: 'debug or release'
        required: false
        default: 'debug'
      minSdk:
        description: 'Minimum SDK'
        required: false
        default: '24'
      permissions:
        description: 'Permissions comma separated'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar

      - name: Insert MainActivity code
        run: |
          PACKAGE_DIR=$(echo "${{ github.event.inputs.packageName }}" | tr '.' '/')
          mkdir -p "app/src/main/java/$PACKAGE_DIR"
          echo "${{ github.event.inputs.main_code }}" | base64 -d > "app/src/main/java/$PACKAGE_DIR/MainActivity.kt"

      - name: Insert Layout code
        if: ${{ github.event.inputs.layout_code != '' }}
        run: |
          echo "${{ github.event.inputs.layout_code }}" | base64 -d > app/src/main/res/layout/activity_main.xml

      - name: Update app name
        run: |
          sed -i "s/MyApp/${{ github.event.inputs.appName }}/g" app/src/main/res/values/strings.xml

      - name: Update package name
        run: |
          PACKAGE="${{ github.event.inputs.packageName }}"
          sed -i "s/com.mybuilder.app/$PACKAGE/g" app/build.gradle.kts
          sed -i "s/com.mybuilder.app/$PACKAGE/g" app/src/main/AndroidManifest.xml

      - name: Update min SDK
        if: ${{ github.event.inputs.minSdk != '24' }}
        run: |
          sed -i "s/minSdk = 24/minSdk = ${{ github.event.inputs.minSdk }}/g" app/build.gradle.kts

      - name: Add permissions
        if: ${{ github.event.inputs.permissions != '' }}
        run: |
          PERMS="${{ github.event.inputs.permissions }}"
          PERM_LINES=""
          if echo "$PERMS" | grep -q "camera"; then
            PERM_LINES="$PERM_LINES<uses-permission android:name=\"android.permission.CAMERA\" />\n"
          fi
          if echo "$PERMS" | grep -q "storage"; then
            PERM_LINES="$PERM_LINES<uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\" />\n<uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\" />\n"
          fi
          if echo "$PERMS" | grep -q "location"; then
            PERM_LINES="$PERM_LINES<uses-permission android:name=\"android.permission.ACCESS_FINE_LOCATION\" />\n"
          fi
          if echo "$PERMS" | grep -q "microphone"; then
            PERM_LINES="$PERM_LINES<uses-permission android:name=\"android.permission.RECORD_AUDIO\" />\n"
          fi
          if echo "$PERMS" | grep -q "bluetooth"; then
            PERM_LINES="$PERM_LINES<uses-permission android:name=\"android.permission.BLUETOOTH\" />\n<uses-permission android:name=\"android.permission.BLUETOOTH_ADMIN\" />\n"
          fi
          if [ -n "$PERM_LINES" ]; then
            sed -i "s|<uses-permission android:name=\"android.permission.INTERNET\" />|<uses-permission android:name=\"android.permission.INTERNET\" />\n$PERM_LINES|g" app/src/main/AndroidManifest.xml
          fi

      - name: Add extra dependencies
        if: ${{ github.event.inputs.dependencies != '' }}
        run: |
          DEPS="${{ github.event.inputs.dependencies }}"
          sed -i "/implementation(\"androidx.cardview:cardview:1.0.0\")/a\\    $DEPS" app/build.gradle.kts

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build APK
        run: |
          if [ "${{ github.event.inputs.buildType }}" = "release" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.appName }}-${{ github.event.inputs.buildType }}
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          retention-days: 7
